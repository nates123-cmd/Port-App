<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1714" />
<title>Port</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1714; --panel:#221e1a; --panel2:#2b2621; --ink:#efe7dd; --muted:#a99e90;
    --accent:#e0a36a; --accent2:#7faf8a; --warn:#d98a6a; --line:#3a342d;
    --font-display:'Fraunces',Georgia,serif; --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  [hidden]{display:none !important}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--font-mono);font-size:16px;overscroll-behavior:none}
  body{user-select:none}
  input,textarea{user-select:text}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto}
  header{padding:14px 16px calc(14px) 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;padding-top:max(14px,env(safe-area-inset-top))}
  header .logo{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:.5px}
  header .sess{color:var(--muted);font-size:13px;margin-left:auto;text-align:right;line-height:1.3}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .s-idle{background:var(--muted)} .s-working{background:var(--accent)} .s-waiting{background:var(--accent2)} .s-error{background:var(--warn)}
  .pulse{animation:p 1.1s ease-in-out infinite} @keyframes p{50%{opacity:.35}}
  #log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
  .msg{max-width:88%;padding:10px 13px;border-radius:var(--radius);line-height:1.45;white-space:pre-wrap;word-break:break-word;font-size:15px}
  .user{align-self:flex-end;background:var(--accent);color:#241a12;border-bottom-right-radius:4px}
  .assistant{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .system{align-self:center;color:var(--muted);font-size:12.5px;background:transparent}
  .role{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;opacity:.8}
  .user .role{color:#5a3f28}
  form{display:flex;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;border-top:1px solid var(--line);background:var(--panel)}
  textarea#box{flex:1;resize:none;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:11px 13px;font-family:var(--font-mono);font-size:16px;max-height:130px;line-height:1.4}
  button{font-family:var(--font-mono);border:none;border-radius:12px;padding:0 18px;background:var(--accent);
    color:#241a12;font-weight:500;font-size:16px}
  button:disabled{opacity:.4}
  /* auth */
  #auth{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:24px;text-align:center}
  #auth h1{font-family:var(--font-display);font-weight:600;font-size:40px;margin:0}
  #auth p{color:var(--muted);margin:0 0 6px}
  #auth input{width:min(340px,90vw);background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;font-family:var(--font-mono);font-size:16px;text-align:center}
  #auth button{padding:13px 22px}
  .hint{color:var(--muted);font-size:13px;min-height:18px}
</style>
</head>
<body>
<div id="app">
  <div id="auth" hidden>
    <h1>Port</h1>
    <p>Claude Code, from your pocket.</p>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com" />
    <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code" hidden />
    <button id="authbtn">Send code</button>
    <div class="hint" id="authhint"></div>
  </div>

  <header hidden id="hdr">
    <span class="logo">Port</span>
    <span class="sess" id="sess">…</span>
  </header>
  <div id="log" hidden></div>
  <form id="form" hidden>
    <textarea id="box" rows="1" placeholder="Message the session…" enterkeyhint="send"></textarea>
    <button id="send" type="submit">↑</button>
  </form>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://xsmnfcmtbpeaccnyinkr.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzbW5mY210YnBlYWNjbnlpbmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzODQ3MjksImV4cCI6MjA5Mzk2MDcyOX0.flUt1SAkkt1ppcKCR2XnPKbAaS4PjCLMzi3Gu08jVWo";
const SESSION_ID = "admin"; // v1: single session

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const $ = (id) => document.getElementById(id);
const el = { auth:$("auth"), email:$("email"), code:$("code"), authbtn:$("authbtn"), authhint:$("authhint"),
  hdr:$("hdr"), sess:$("sess"), log:$("log"), form:$("form"), box:$("box"), send:$("send") };

const STATE_LABEL = { idle:"idle", working:"working…", waiting:"waiting on you", error:"error" };

function show(authed){
  el.auth.hidden = authed;
  for (const n of [el.hdr, el.log, el.form]) n.hidden = !authed;
}

// ---- auth (Supabase email OTP) ----
let stage = "email";
el.authbtn.onclick = async () => {
  el.authhint.textContent = "";
  if (stage === "email"){
    const email = el.email.value.trim();
    if (!email) return;
    el.authbtn.disabled = true;
    const { error } = await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:true } });
    el.authbtn.disabled = false;
    if (error) return (el.authhint.textContent = error.message);
    stage = "code"; el.code.hidden = false; el.code.focus();
    el.authbtn.textContent = "Verify"; el.authhint.textContent = "Code sent. Check your email.";
  } else {
    const email = el.email.value.trim(), token = el.code.value.trim();
    el.authbtn.disabled = true;
    const { error } = await sb.auth.verifyOtp({ email, token, type:"email" });
    el.authbtn.disabled = false;
    if (error) return (el.authhint.textContent = error.message);
    boot();
  }
};

// ---- chat ----
const seen = new Set();
function render(m){
  if (seen.has(m.id)) return; seen.add(m.id);
  const d = document.createElement("div");
  d.className = "msg " + m.role;
  const r = document.createElement("div"); r.className="role"; r.textContent = m.role;
  const c = document.createElement("div"); c.textContent = m.content;
  if (m.role!=="system") d.appendChild(r);
  d.appendChild(c); el.log.appendChild(d);
  el.log.scrollTop = el.log.scrollHeight;
}
function setSession(s){
  if (!s) return;
  const lbl = STATE_LABEL[s.state] || s.state;
  el.sess.innerHTML = `<span class="dot s-${s.state} ${s.state==="working"?"pulse":""}"></span>${lbl}<br><span style="opacity:.7">${s.project||""}</span>`;
}

async function loadHistory(){
  const { data } = await sb.from("port_messages").select("*").eq("session_id",SESSION_ID).order("id");
  el.log.innerHTML=""; seen.clear();
  (data||[]).forEach(render);
}
async function loadSession(){
  const { data } = await sb.from("port_sessions").select("*").eq("id",SESSION_ID).single();
  setSession(data);
}

el.box.addEventListener("input", ()=>{ el.box.style.height="auto"; el.box.style.height=Math.min(el.box.scrollHeight,130)+"px"; });
el.box.addEventListener("keydown",(e)=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); el.form.requestSubmit(); }});
el.form.onsubmit = async (e)=>{
  e.preventDefault();
  const content = el.box.value.trim(); if(!content) return;
  el.box.value=""; el.box.style.height="auto";
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from("port_messages").insert({ session_id:SESSION_ID, role:"user", content, user_id:user.id });
  if (error) render({ id:"e"+Date.now(), role:"system", content:"send failed: "+error.message });
};

async function boot(){
  show(true);
  await loadSession();
  await loadHistory();
  // realtime: new messages + session state
  sb.channel("port")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"port_messages",filter:`session_id=eq.${SESSION_ID}`},
        (p)=>render(p.new))
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"port_sessions",filter:`id=eq.${SESSION_ID}`},
        (p)=>setSession(p.new))
    .subscribe();
  // lightweight fallback poll (in case realtime drops)
  setInterval(loadSession, 5000);
}

// session restore
const { data:{ session } } = await sb.auth.getSession();
if (session) boot(); else show(false);
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
