<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1714" />
<title>Port</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1714; --panel:#221e1a; --panel2:#2b2621; --ink:#efe7dd; --muted:#a99e90;
    --accent:#e0a36a; --accent2:#7faf8a; --warn:#d98a6a; --line:#3a342d;
    --font-display:'Fraunces',Georgia,serif; --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  [hidden]{display:none !important}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--font-mono);font-size:16px;overscroll-behavior:none}
  body{user-select:none}
  input,textarea{user-select:text}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto}
  header{padding:max(14px,env(safe-area-inset-top)) 16px 14px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px}
  header .logo{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:.5px}
  header .sub,header .sess{color:var(--muted);font-size:13px;margin-left:auto;text-align:right;line-height:1.3}
  .back{font-size:26px;background:none;color:var(--ink);padding:0 6px 0 0;border:none;line-height:1}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .s-idle{background:var(--muted)} .s-working{background:var(--accent)} .s-waiting{background:var(--accent2)} .s-error{background:var(--warn)}
  .pulse{animation:p 1.1s ease-in-out infinite} @keyframes p{50%{opacity:.35}}
  #listview,#chatview{display:flex;flex-direction:column;flex:1;min-height:0}
  #sessions{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;cursor:pointer;position:relative;touch-action:pan-y}
  .card:active{background:var(--panel)}
  .card .top{display:flex;align-items:center;gap:8px}
  .card .name{font-family:var(--font-display);font-size:18px;font-weight:600}
  .card .st{margin-left:auto;font-size:12px;color:var(--muted)}
  .card .last{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .empty{color:var(--muted);text-align:center;margin-top:40px;font-size:14px;line-height:1.6;padding:0 30px}
  #log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
  .msg{max-width:88%;padding:10px 13px;border-radius:var(--radius);line-height:1.45;white-space:pre-wrap;word-break:break-word;font-size:15px}
  .user{align-self:flex-end;background:var(--accent);color:#241a12;border-bottom-right-radius:4px}
  .assistant{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .system{align-self:center;color:var(--muted);font-size:12.5px;background:transparent}
  .role{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;opacity:.8}
  .user .role{color:#5a3f28}
  form{display:flex;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;border-top:1px solid var(--line);background:var(--panel)}
  textarea#box{flex:1;resize:none;background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:11px 13px;font-family:var(--font-mono);font-size:16px;max-height:130px;line-height:1.4}
  button.send{font-family:var(--font-mono);border:none;border-radius:12px;padding:0 18px;background:var(--accent);color:#241a12;font-weight:500;font-size:16px}
  button:disabled{opacity:.4}
  #auth{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:24px;text-align:center}
  #auth h1{font-family:var(--font-display);font-weight:600;font-size:40px;margin:0}
  #auth p{color:var(--muted);margin:0 0 6px}
  #auth input{width:min(340px,90vw);background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;font-family:var(--font-mono);font-size:16px;text-align:center}
  #auth button{padding:13px 22px;border:none;border-radius:12px;background:var(--accent);color:#241a12;font-weight:500;font-size:16px}
  #ctitle{cursor:pointer} .hint{color:var(--muted);font-size:13px;min-height:18px}
  .assistant .tldr{font-size:15.5px;line-height:1.5}
  .assistant .q{margin-top:8px;font-weight:500}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  .chip{font-family:var(--font-mono);font-size:13px;padding:7px 12px;border-radius:11px;border:1px solid var(--accent);background:rgba(224,163,106,.14);color:var(--ink)}
  .chip:active{background:rgba(224,163,106,.3)}
  .chip.ghost{border-color:var(--line);background:transparent;color:var(--muted)}
  .full{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);color:var(--muted);font-size:13.5px;white-space:pre-wrap;line-height:1.45}
  .hdrbtn{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:5px 10px;font-size:12px;font-family:var(--font-mono)}
  #sess{margin-left:10px}
  .cardwrap{position:relative;border-radius:var(--radius)}
  .delback{position:absolute;inset:0;background:#7a2f24;color:#fff;display:flex;align-items:center;justify-content:flex-end;padding-right:22px;font-size:14px;border-radius:var(--radius)}
  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 16px;border-radius:20px;font-size:13px;z-index:50}
  #newbtn{margin-left:8px}
  #notif{margin-left:auto}
  #newmodal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:60}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:760px;padding:18px 16px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px}
  .sheet h2{font-family:var(--font-display);font-weight:600;margin:0 0 2px;font-size:22px}
  .sheet input,.sheet textarea{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-family:var(--font-mono);font-size:16px;resize:none}
  .sheetbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
  #pull{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--muted);font-size:12px;flex:none}
  #pull.loading #pullspin{animation:spin .7s linear infinite}
  #pullspin{display:inline-block;font-size:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="toast" hidden>Copied</div>
  <div id="newmodal" hidden>
    <div class="sheet">
      <h2>New session</h2>
      <input id="nname" placeholder="Name (e.g. Patch triage)" />
      <input id="ndir" placeholder="Working dir (default /home/nate)" />
      <textarea id="ntask" rows="3" placeholder="First task / message (e.g. run /patch-triage)"></textarea>
      <div class="sheetbtns"><button class="chip ghost" id="ncancel">Cancel</button><button class="send" id="nstart">Start</button></div>
    </div>
  </div>
  <div id="auth" hidden>
    <h1>Port</h1>
    <p>Claude Code, from your pocket.</p>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com" />
    <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code" hidden />
    <button id="authbtn">Send code</button>
    <div class="hint" id="authhint"></div>
  </div>

  <div id="listview" hidden>
    <header><span class="logo">Port</span><span class="sub" id="lsub">sessions</span><button class="hdrbtn" id="notif" title="Enable notifications">\u{1f514}</button><button class="hdrbtn" id="newbtn">+ New</button></header>
    <div id="sessions"></div>
  </div>

  <div id="chatview" hidden>
    <header>
      <button class="back" id="back">‹</button>
      <span class="logo" id="ctitle">…</span>
      <button class="hdrbtn" id="clear">Clear</button>
      <span class="sess" id="sess"></span>
    </header>
    <div id="log"></div>
    <div id="pull"><span id="pullspin">↻</span><span id="pulltxt">Swipe up to refresh</span></div>
    <form id="form">
      <textarea id="box" rows="1" placeholder="Message the session…" enterkeyhint="send"></textarea>
      <button class="send" id="send" type="submit">↑</button>
    </form>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://xsmnfcmtbpeaccnyinkr.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzbW5mY210YnBlYWNjbnlpbmtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzODQ3MjksImV4cCI6MjA5Mzk2MDcyOX0.flUt1SAkkt1ppcKCR2XnPKbAaS4PjCLMzi3Gu08jVWo";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const VAPID_PUBLIC = "BKG4e5bElkd_GtNWU9JSsrxoRqELKbiISYIyJF8Lj2B70ImUHYyBL2Dag9YsgEfuEAYDjdzkS0NgXihelSDNZmM";
const $ = (id) => document.getElementById(id);
const STATE_LABEL = { idle:"idle", working:"working…", waiting:"waiting on you", error:"error" };
function view(v){ for (const n of ["auth","listview","chatview"]) $(n).hidden = (n!==v); }
function esc(t){ const d=document.createElement("div"); d.textContent=t==null?"":String(t); return d.innerHTML; }

let stage="email";
$("authbtn").onclick = async () => {
  $("authhint").textContent="";
  if (stage==="email"){
    const email=$("email").value.trim(); if(!email) return;
    $("authbtn").disabled=true;
    const { error } = await sb.auth.signInWithOtp({ email, options:{ shouldCreateUser:true }});
    $("authbtn").disabled=false;
    if (error) return ($("authhint").textContent=error.message);
    stage="code"; $("code").hidden=false; $("code").focus(); $("authbtn").textContent="Verify"; $("authhint").textContent="Code sent. Check your email.";
  } else {
    const email=$("email").value.trim(), token=$("code").value.trim();
    $("authbtn").disabled=true;
    const { error } = await sb.auth.verifyOtp({ email, token, type:"email" });
    $("authbtn").disabled=false;
    if (error) return ($("authhint").textContent=error.message);
    boot();
  }
};

function card(s){
  const wrap=document.createElement("div"); wrap.className="cardwrap";
  const back=document.createElement("div"); back.className="delback"; back.textContent="Delete"; back.onclick=()=>deleteSession(s);
  const d=document.createElement("div"); d.className="card";
  const working = s.state==="working";
  d.innerHTML = `<div class="top"><span class="dot s-${s.state} ${working?'pulse':''}"></span>`+
    `<span class="name">${esc(s.title||s.project||s.id)}</span>`+
    `<span class="st">${STATE_LABEL[s.state]||s.state}</span></div>`+
    `<div class="last">${esc(s.last_line||"—")}</div>`;
  let sx=0, base=0, dragging=false, did=false;
  d.addEventListener("pointerdown",(e)=>{ sx=e.clientX; dragging=true; did=false; d.style.transition="none"; });
  d.addEventListener("pointermove",(e)=>{ if(!dragging) return; const dx=e.clientX-sx; if(Math.abs(dx)>4) did=true; const tx=Math.max(-90,Math.min(0,base+dx)); d.style.transform=`translateX(${tx}px)`; });
  function settle(e){ if(!dragging) return; dragging=false; d.style.transition="transform .18s ease"; const dx=((e&&e.clientX)||0)-sx; if(!did){ if(base<=-45){ base=0; } else { openSession(s); } } else { base=(base+dx)<=-45?-90:0; } d.style.transform=`translateX(${base}px)`; }
  d.addEventListener("pointerup",settle);
  d.addEventListener("pointercancel",()=>{ dragging=false; d.style.transition="transform .18s ease"; d.style.transform=`translateX(${base}px)`; });
  wrap.appendChild(back); wrap.appendChild(d); return wrap;
}
async function loadSessions(){
  const { data } = await sb.from("port_sessions").select("*").order("updated_at",{ascending:false});
  const wrap=$("sessions"); wrap.innerHTML="";
  if (!data||!data.length){ wrap.innerHTML='<div class="empty">No sessions yet.<br>Run <b>/port</b> from your Mac to aim one here.</div>'; $("lsub").textContent="sessions"; return; }
  $("lsub").textContent = `${data.length} session${data.length>1?'s':''}`;
  data.forEach(s=>wrap.appendChild(card(s)));
}

let cur=null, msgChan=null;
const seen=new Set();
function render(m){
  if (seen.has(m.id)) return; seen.add(m.id);
  const d=document.createElement("div"); d.className="msg "+m.role;
  if (m.role==="assistant" && m.card){
    const card=m.card;
    const t=document.createElement("div"); t.className="tldr"; t.textContent=card.tldr||m.content; d.appendChild(t);
    if (card.question){ const q=document.createElement("div"); q.className="q"; q.textContent=card.question; d.appendChild(q); }
    if (card.options && card.options.length){
      const ch=document.createElement("div"); ch.className="chips";
      card.options.forEach(o=>{ const b=document.createElement("button"); b.className="chip"; b.textContent=o; b.onclick=()=>sendText(o); ch.appendChild(b); });
      d.appendChild(ch);
    }
    const act=document.createElement("div"); act.className="chips";
    const more=document.createElement("button"); more.className="chip ghost"; more.textContent="Explain more"; more.onclick=()=>sendText("Explain that in more detail, in plain simple terms."); act.appendChild(more);
    const fc=document.createElement("div"); fc.className="full"; fc.textContent=m.content; fc.hidden=true;
    const full=document.createElement("button"); full.className="chip ghost"; full.textContent="Show full \u25be";
    full.onclick=()=>{ fc.hidden=!fc.hidden; full.textContent=fc.hidden?"Show full \u25be":"Hide \u25b4"; };
    act.appendChild(full); const cp=document.createElement("button"); cp.className="chip ghost"; cp.textContent="Copy"; cp.onclick=()=>copy(m.content); act.appendChild(cp); d.appendChild(act); d.appendChild(fc);
  } else {
    if (m.role!=="system"){ const r=document.createElement("div"); r.className="role"; r.textContent=m.role; d.appendChild(r); }
    const c=document.createElement("div"); c.textContent=m.content; c.style.cursor="pointer"; c.title="Tap to copy"; c.onclick=()=>copy(m.content); d.appendChild(c);
  }
  $("log").appendChild(d); $("log").scrollTop=$("log").scrollHeight;
}
function setStatus(s){
  if (!s) return;
  $("sess").innerHTML = `<span class="dot s-${s.state} ${s.state==='working'?'pulse':''}"></span>${STATE_LABEL[s.state]||s.state}`;
}
async function openSession(s){
  cur=s.id; view("chatview"); $("ctitle").textContent=s.title||s.project||s.id; setStatus(s);
  $("log").innerHTML=""; seen.clear();
  const { data } = await sb.from("port_messages").select("*").eq("session_id",cur).order("id");
  (data||[]).forEach(render);
  subscribeChat();
}
function subscribeChat(){
  if(!cur) return;
  if (msgChan) sb.removeChannel(msgChan);
  msgChan = sb.channel("msgs-"+cur)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"port_messages",filter:`session_id=eq.${cur}`},(p)=>{ if(cur===p.new.session_id) render(p.new); })
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"port_sessions",filter:`id=eq.${cur}`},(p)=>setStatus(p.new))
    .subscribe();
}
$("back").onclick=()=>{ if(msgChan){sb.removeChannel(msgChan);msgChan=null;} cur=null; view("listview"); loadSessions(); };

$("ctitle").onclick=async()=>{ if(!cur)return; const v=prompt("Rename session",$("ctitle").textContent); if(v&&v.trim()){ const nn=v.trim(); await sb.from("port_sessions").update({title:nn}).eq("id",cur); $("ctitle").textContent=nn; } };
$("box").addEventListener("input",()=>{ const b=$("box"); b.style.height="auto"; b.style.height=Math.min(b.scrollHeight,130)+"px"; });
$("box").addEventListener("keydown",(e)=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); $("form").requestSubmit(); }});
async function sendText(content){
  if(!cur||!content) return;
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from("port_messages").insert({ session_id:cur, role:"user", content, user_id:user.id });
  if (error) render({ id:"e"+Date.now(), role:"system", content:"send failed: "+error.message });
}
$("form").onsubmit=async(e)=>{
  e.preventDefault();
  const content=$("box").value.trim(); if(!content) return;
  $("box").value=""; $("box").style.height="auto"; await sendText(content);
};

async function refreshChat(){
  if(!cur) return;
  const { data } = await sb.from("port_messages").select("*").eq("session_id",cur).order("id");
  (data||[]).forEach(render);
  const s = (await sb.from("port_sessions").select("*").eq("id",cur).limit(1)).data?.[0];
  if(s) setStatus(s);
}
// swipe up at the bottom of the log to pull in new messages (realtime can go stale after the phone sleeps)
(function(){
  const log=$("log"), pull=$("pull"), txt=$("pulltxt");
  let y0=0, active=false, dist=0, ready=false;
  const atBottom=()=> log.scrollHeight - log.scrollTop - log.clientHeight < 4;
  const setH=(h)=>{ pull.style.height=h+"px"; };
  log.addEventListener("touchstart",(e)=>{ if(e.touches.length!==1) return; y0=e.touches[0].clientY; active=atBottom(); ready=false; dist=0; pull.style.transition="none"; },{passive:true});
  log.addEventListener("touchmove",(e)=>{
    if(!active) return;
    const dy=e.touches[0].clientY-y0;            // swipe up => dy<0
    if(dy>=0 || !atBottom()){ if(dist){ dist=0; setH(0); } active=atBottom(); return; }
    dist=Math.min(-dy*0.5,80); setH(dist);
    ready=dist>=52; txt.textContent=ready?"Release to refresh":"Swipe up to refresh";
    e.preventDefault();
  },{passive:false});
  log.addEventListener("touchend",async()=>{
    if(!active) return; active=false;
    pull.style.transition="height .16s ease";
    if(ready){ setH(34); pull.classList.add("loading"); txt.textContent="Refreshing…"; try{ await refreshChat(); }catch{} pull.classList.remove("loading"); }
    setH(0);
  });
})();
function toast(t){ const e=$("toast"); e.textContent=t; e.hidden=false; clearTimeout(toast._t); toast._t=setTimeout(()=>e.hidden=true,1200); }
async function copy(t){ try{ await navigator.clipboard.writeText(t); toast("Copied"); }catch{ toast("Copy failed"); } }
async function deleteSession(s){ if(!confirm(`Delete "${s.title||s.id}"? Removes its chat.`)) return; await sb.from("port_sessions").delete().eq("id",s.id); loadSessions(); }
async function clearChat(){ if(!cur) return; if(!confirm("Clear all messages in this chat?")) return; await sb.from("port_messages").delete().eq("session_id",cur); $("log").innerHTML=""; seen.clear(); }
$("clear").onclick=clearChat;
function urlB64ToU8(b){ const pad="=".repeat((4-b.length%4)%4); const s2=(b+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(s2); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function enableNotifications(){
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){ toast("Push not supported here"); return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ toast("Notifications blocked"); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToU8(VAPID_PUBLIC) });
    const j=sub.toJSON();
    const { data:{ user } }=await sb.auth.getUser();
    await sb.from("port_push_subs").upsert({ user_id:user.id, endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth },{ onConflict:"endpoint" });
    toast("Notifications on \u2705");
  }catch(e){ toast("Couldn't enable: "+(e.message||e)); }
}
$("notif").onclick=enableNotifications;
$("newbtn").onclick=()=>{ $("nname").value=""; $("ndir").value=""; $("ntask").value=""; $("newmodal").hidden=false; $("nname").focus(); };
$("ncancel").onclick=()=>{ $("newmodal").hidden=true; };
$("newmodal").onclick=(e)=>{ if(e.target.id==="newmodal") $("newmodal").hidden=true; };
$("nstart").onclick=async()=>{
  const name=$("nname").value.trim(); if(!name){ $("nname").focus(); return; }
  const dir=$("ndir").value.trim()||"/home/nate";
  const task=$("ntask").value.trim();
  const id=(name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,28)||"session")+"-"+Math.random().toString(36).slice(2,6);
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from("port_sessions").insert({ id, user_id:user.id, title:name, project:name, cwd:dir, state:"idle" });
  if (error){ toast("create failed"); return; }
  if (task) await sb.from("port_messages").insert({ session_id:id, role:"user", content:task, user_id:user.id });
  $("newmodal").hidden=true;
  openSession({ id, title:name, project:name, state:"idle" });
};
let listChan=null;
async function boot(){
  view("listview");
  await loadSessions();
  if (!listChan) listChan = sb.channel("sessions")
    .on("postgres_changes",{event:"*",schema:"public",table:"port_sessions"},()=>{ if(!cur) loadSessions(); })
    .subscribe();
  setInterval(()=>{ if(!cur) loadSessions(); }, 6000);
}
// catch up automatically when the app returns to the foreground / network comes back
// (the realtime socket dies when the phone sleeps, so we re-subscribe + silently re-fetch)
let waking=false;
async function onWake(){
  if (document.visibilityState==="hidden" || waking) return;
  waking=true;
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) return;
    if (cur){ subscribeChat(); await refreshChat(); }
    else {
      if (listChan){ sb.removeChannel(listChan); listChan=null; }
      listChan = sb.channel("sessions")
        .on("postgres_changes",{event:"*",schema:"public",table:"port_sessions"},()=>{ if(!cur) loadSessions(); })
        .subscribe();
      await loadSessions();
    }
  } catch{} finally { waking=false; }
}
document.addEventListener("visibilitychange", onWake);
window.addEventListener("focus", onWake);
window.addEventListener("online", onWake);
const { data:{ session } } = await sb.auth.getSession();
if (session) boot(); else view("auth");
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
